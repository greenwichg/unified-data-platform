name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.6.6"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: "ap-south-1"

jobs:
  # --------------------------------------------------------------------------
  # Detect changed environments
  # --------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      dev_changed: ${{ steps.filter.outputs.dev_changed }}
      staging_changed: ${{ steps.filter.outputs.staging_changed }}
      prod_changed: ${{ steps.filter.outputs.prod_changed }}
      modules_changed: ${{ steps.filter.outputs.modules_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- terraform/)
          echo "Changed files:"
          echo "$CHANGED"

          MODULES_CHANGED="false"
          if echo "$CHANGED" | grep -q "terraform/modules/"; then
            MODULES_CHANGED="true"
          fi

          DEV_CHANGED="false"
          if echo "$CHANGED" | grep -q "terraform/environments/dev/" || [ "$MODULES_CHANGED" = "true" ]; then
            DEV_CHANGED="true"
          fi

          STAGING_CHANGED="false"
          if echo "$CHANGED" | grep -q "terraform/environments/staging/" || [ "$MODULES_CHANGED" = "true" ]; then
            STAGING_CHANGED="true"
          fi

          PROD_CHANGED="false"
          if echo "$CHANGED" | grep -q "terraform/environments/prod/" || [ "$MODULES_CHANGED" = "true" ]; then
            PROD_CHANGED="true"
          fi

          echo "modules_changed=${MODULES_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "dev_changed=${DEV_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "staging_changed=${STAGING_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "prod_changed=${PROD_CHANGED}" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Apply: dev (automatic)
  # --------------------------------------------------------------------------
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dev_changed == 'true'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/github-actions-terraform
          role-session-name: terraform-apply-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false -no-color

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -input=false -no-color -auto-approve tfplan

  # --------------------------------------------------------------------------
  # Apply: staging (automatic, after dev)
  # --------------------------------------------------------------------------
  apply-staging:
    name: Apply (staging)
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-dev]
    if: |
      always() &&
      needs.detect-changes.outputs.staging_changed == 'true' &&
      (needs.apply-dev.result == 'success' || needs.apply-dev.result == 'skipped')
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_STAGING }}:role/github-actions-terraform
          role-session-name: terraform-apply-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/staging
        run: terraform init -input=false -no-color

      - name: Terraform Plan
        working-directory: terraform/environments/staging
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        run: terraform apply -input=false -no-color -auto-approve tfplan

  # --------------------------------------------------------------------------
  # Apply: prod (requires manual approval)
  # --------------------------------------------------------------------------
  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-staging]
    if: |
      always() &&
      needs.detect-changes.outputs.prod_changed == 'true' &&
      (needs.apply-staging.result == 'success' || needs.apply-staging.result == 'skipped')
    environment:
      name: prod
      # GitHub Environment protection rules enforce manual approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_PROD }}:role/github-actions-terraform
          role-session-name: terraform-apply-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -input=false -no-color

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -detailed-exitcode
          echo "IMPORTANT: Review the plan output above before approving."

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -input=false -no-color -auto-approve tfplan

      - name: Notify on success
        if: success()
        run: |
          echo "::notice::Terraform apply to PROD completed successfully."
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Terraform apply to PROD FAILED. Investigate immediately."
