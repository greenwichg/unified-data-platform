name: Flink Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'pipelines/**/flink/**'
      - 'pipelines/**/src/*flink*'
      - 'flink/**'
      - 'pom.xml'
      - '.github/workflows/flink_build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'pipelines/**/flink/**'
      - 'pipelines/**/src/*flink*'
      - 'flink/**'
      - 'pom.xml'

permissions:
  contents: read

env:
  JAVA_VERSION: "11"
  MAVEN_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
  FLINK_VERSION: "1.18.1"

jobs:
  build:
    name: Build & Test Flink Jobs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn clean compile -B -q -DskipTests

      - name: Run unit tests
        run: |
          mvn test -B \
            -Dflink.version=${{ env.FLINK_VERSION }} \
            -Dmaven.test.failure.ignore=false \
            -pl flink-jobs

      - name: Run integration tests
        run: |
          mvn verify -B \
            -Dflink.version=${{ env.FLINK_VERSION }} \
            -DskipUnitTests=true \
            -pl flink-jobs \
            -P integration-tests

      - name: Package Flink fat JAR
        run: |
          mvn package -B \
            -DskipTests \
            -pl flink-jobs \
            -am

      - name: Verify JAR contents
        run: |
          JAR_FILE=$(find flink-jobs/target -name "*.jar" -not -name "*-sources.jar" -not -name "*-tests.jar" | head -1)
          echo "Built JAR: $JAR_FILE"
          echo "JAR size: $(du -h "$JAR_FILE" | cut -f1)"

          # Verify critical classes are present
          jar tf "$JAR_FILE" | grep -q "com/zomato" || echo "WARNING: No com/zomato classes found"
          jar tf "$JAR_FILE" | grep -q "org/apache/flink" || echo "WARNING: Flink runtime not shaded in"

      - name: Upload Flink JAR artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: flink-jobs-${{ github.sha }}
          path: flink-jobs/target/*.jar
          retention-days: 30

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flink-test-reports
          path: flink-jobs/target/surefire-reports/
          retention-days: 14

  # --------------------------------------------------------------------------
  # Upload to S3 on main branch merge
  # --------------------------------------------------------------------------
  deploy-artifact:
    name: Deploy Flink Artifact to S3
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: flink-jobs-${{ github.sha }}
          path: artifacts/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ap-south-1

      - name: Upload to S3
        run: |
          JAR_FILE=$(ls artifacts/*.jar | head -1)
          VERSION=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}
          S3_PATH="s3://zomato-data-platform-artifacts/flink-jobs/${VERSION}/$(basename "$JAR_FILE")"

          aws s3 cp "$JAR_FILE" "$S3_PATH"
          echo "Uploaded: $S3_PATH"

          # Also update the "latest" pointer
          aws s3 cp "$JAR_FILE" "s3://zomato-data-platform-artifacts/flink-jobs/latest/$(basename "$JAR_FILE")"
