# ============================================================================
# Zomato Data Platform - AWS Glue Schema Registry Configuration
# Manages Avro/Protobuf/JSON schemas for all Kafka topics
# Replaces self-hosted Confluent Schema Registry with AWS Glue Schema Registry
# ============================================================================

# ----- AWS Glue Schema Registry Settings -----
region: ap-south-1
registry_name: zomato-data-platform

# ----- Schema Compatibility -----
# BACKWARD: new schema can read data written by old schema
# This is the safest default for evolving schemas without breaking consumers
#
# Available levels:
#   BACKWARD           - new schema can read old data
#   BACKWARD_TRANSITIVE - new schema can read ALL previous versions
#   FORWARD            - old schema can read new data
#   FORWARD_TRANSITIVE - all previous schemas can read new data
#   FULL               - both backward and forward compatible
#   FULL_TRANSITIVE    - full compatibility with ALL previous versions
#   NONE               - no compatibility checking
#   DISABLED           - compatibility checking disabled
compatibility: BACKWARD

# ----- Schema Auto-Registration -----
# When enabled, schemas are automatically registered on first use by producers
# Disable in production for stricter governance; register schemas via CI/CD
schema_auto_registration: false

# ----- Schema Types -----
# Glue Schema Registry supports Avro, JSON Schema, and Protobuf
schema_types:
  - AVRO
  - PROTOBUF
  - JSON

# ----- Serializer/Deserializer Configuration -----
# Use the AWS Glue Schema Registry SerDe in Kafka producers/consumers
# Producer config:
#   key.serializer: com.amazonaws.services.schemaregistry.serializers.GlueSchemaRegistryKafkaSerializer
#   value.serializer: com.amazonaws.services.schemaregistry.serializers.GlueSchemaRegistryKafkaSerializer
# Consumer config:
#   key.deserializer: com.amazonaws.services.schemaregistry.deserializers.GlueSchemaRegistryKafkaDeserializer
#   value.deserializer: com.amazonaws.services.schemaregistry.deserializers.GlueSchemaRegistryKafkaDeserializer

# ----- Compression -----
# Compress schema payloads for reduced network overhead
compression_type: ZLIB

# ----- Caching -----
# Cache schemas locally for fast lookups
cache_size: 1000
cache_ttl_ms: 300000

# ----- Tags -----
# Tags applied to schemas in the registry for organization
tags:
  project: zomato-data-platform
  managed_by: terraform
