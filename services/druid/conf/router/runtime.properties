# ============================================================================
# Zomato Data Platform - Druid Router Runtime Properties
# The router provides a unified API gateway with query routing and
# the Druid management console UI.
# Deployed: 2 instances on r8g.large (2 vCPU, 16 GB) behind external ALB
# ============================================================================

druid.service=druid/router
druid.plaintextPort=8888
druid.host=${DRUID_ROUTER_HOST}

# ----- JVM Tuning -----
# Set via JVM_OPTS: -Xms2g -Xmx2g -XX:MaxDirectMemorySize=256m

# ----- Router Strategy -----
# Default broker service for all queries that don't match specific routing rules
druid.router.defaultBrokerServiceName=druid/broker
druid.router.coordinatorServiceName=druid/coordinator
# Enable management proxy so Druid Console UI works through the router
druid.router.managementProxy.enabled=true

# ----- Tier-based Query Routing -----
# Route queries to the appropriate broker based on data tier
# Future: add hot_tier -> druid/broker-hot for real-time data separation
druid.router.tierToBrokerMap={"_default_tier":"druid/broker","_hot_tier":"druid/broker"}
druid.router.pollPeriod=PT10S

# ----- Query Routing Rules -----
# Default rule routes all unmatched queries through tier-based broker selection
druid.router.defaultRule.type=tieredBroker
druid.router.defaultRule.defaultBrokerServiceName=druid/broker
druid.router.strategies=[{"type":"timeBoundary"},{"type":"priority"}]

# ----- HTTP -----
# 25 HTTP threads sufficient for router (lightweight proxy, not processing-heavy)
druid.server.http.numThreads=25
druid.server.http.maxIdleTime=PT5M
druid.server.http.gracefulShutdownTimeout=PT30S

# ----- Connection Pooling -----
druid.router.http.numConnections=25
druid.router.http.readTimeout=PT5M
druid.router.http.numMaxThreads=100
druid.router.http.maxQueuedBytes=10000000

# ----- Avatar (Query Discovery) -----
druid.router.avatica.balancer.type=rendezvousHash

# ----- Monitoring -----
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor"]
