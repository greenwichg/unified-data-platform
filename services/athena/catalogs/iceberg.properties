# NOTE: Catalog configuration is now handled by Athena data sources and Glue Data Catalog.
connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hive-metastore.prod.internal:9083
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD
iceberg.max-partitions-per-writer=1000
iceberg.target-max-file-size=1073741824
iceberg.expire_snapshots.min-retention=7d
iceberg.delete-orphan-files.min-retention=7d
iceberg.register-table-procedure.enabled=true
iceberg.merge-on-read-mode-enabled=true
hive.s3.path-style-access=false
hive.s3.ssl.enabled=true
hive.s3.sse.enabled=true
hive.s3.sse.type=S3
hive.s3.endpoint=https://s3.ap-south-1.amazonaws.com
hive.s3.aws-access-key=
hive.s3.aws-secret-key=
hive.s3.iam-role=
