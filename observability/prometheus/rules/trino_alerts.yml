# =============================================================================
# DEPRECATED: Trino has been replaced by Amazon Athena (serverless).
#
# Athena monitoring is now handled via:
#   - AWS CloudWatch metrics (AWS/Athena namespace)
#   - CloudWatch Alarms configured in Terraform (terraform/modules/athena/)
#   - Custom CloudWatch metrics published by scripts/ops/trino_cluster_health.sh
#     (now renamed to Athena workgroup health check)
#
# The CloudWatch-based alerts cover:
#   - AthenaQueryFailureRateHigh: >10% query failures over 15 min
#   - AthenaQueryFailureRateCritical: >30% query failures over 5 min
#   - AthenaDataScannedHigh: Excessive data scanned (cost alert)
#   - AthenaQueryLatencyHigh: p99 execution time > 5 minutes
#
# These Prometheus rules are kept as reference only. They will not fire
# since Trino exporters are no longer deployed in production.
# =============================================================================
groups:
  - name: athena_health
    interval: 60s
    rules:
      # -----------------------------------------------------------------------
      # Athena health check (from custom metrics published to Prometheus
      # via CloudWatch exporter or pushgateway)
      # -----------------------------------------------------------------------
      - alert: AthenaWorkgroupUnhealthy
        expr: athena_workgroup_healthy == 0
        for: 5m
        labels:
          severity: critical
          team: data-platform
          service: athena
        annotations:
          summary: "Athena workgroup {{ $labels.workgroup }} is unhealthy"
          description: >-
            Athena workgroup {{ $labels.workgroup }} health check is failing.
            Check AWS Console for workgroup status and CloudWatch for errors.
          runbook_url: https://runbooks.zomato.internal/athena/workgroup-unhealthy

      - alert: AthenaQueryFailureRateHigh
        expr: >
          athena_failed_queries / (athena_total_queries + 0.001) > 0.10
        for: 15m
        labels:
          severity: warning
          team: data-platform
          service: athena
        annotations:
          summary: "Athena query failure rate above 10% in workgroup {{ $labels.workgroup }}"
          description: >-
            {{ $value | printf "%.1f" | humanizePercentage }} of Athena queries are
            failing in workgroup {{ $labels.workgroup }} over the last 15 minutes.
          runbook_url: https://runbooks.zomato.internal/athena/query-failures

      - alert: AthenaQueryFailureRateCritical
        expr: >
          athena_failed_queries / (athena_total_queries + 0.001) > 0.30
        for: 5m
        labels:
          severity: critical
          team: data-platform
          service: athena
        annotations:
          summary: "Athena query failure rate above 30% in workgroup {{ $labels.workgroup }}"
          description: >-
            {{ $value | printf "%.1f" | humanizePercentage }} of Athena queries are
            failing. Analytical workloads are severely impacted.
          runbook_url: https://runbooks.zomato.internal/athena/query-failures-critical

      - alert: AthenaDataScannedExcessive
        expr: >
          athena_data_scanned_gb > 500
        for: 30m
        labels:
          severity: warning
          team: data-platform
          service: athena
        annotations:
          summary: "Athena workgroup {{ $labels.workgroup }} scanned >500 GB in 30 min"
          description: >-
            Excessive data scanned ({{ $value | printf "%.0f" }} GB) in
            workgroup {{ $labels.workgroup }}. Review queries for missing
            partition pruning or full table scans.
          runbook_url: https://runbooks.zomato.internal/athena/excessive-scan
