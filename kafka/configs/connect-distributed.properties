# ============================================================================
# Zomato Data Platform - Kafka Connect Distributed Mode Configuration
# Used for: Debezium CDC connectors (Aurora PostgreSQL -> Kafka)
# Workers: 6 Kafka Connect nodes behind internal LB
# ============================================================================

# ----- Cluster Configuration -----
bootstrap.servers=kafka1.zomato-data.internal:9092,kafka2.zomato-data.internal:9092,kafka3.zomato-data.internal:9092
group.id=zomato-connect-cluster-prod

# ----- Connector Key/Value Converters -----
key.converter=io.confluent.connect.avro.AvroConverter
key.converter.schema.registry.url=http://schema-registry.zomato-data.internal:8081
key.converter.enhanced.avro.schema.support=true

value.converter=io.confluent.connect.avro.AvroConverter
value.converter.schema.registry.url=http://schema-registry.zomato-data.internal:8081
value.converter.enhanced.avro.schema.support=true

# ----- Internal Converters -----
internal.key.converter=org.apache.kafka.connect.json.JsonConverter
internal.key.converter.schemas.enable=false
internal.value.converter=org.apache.kafka.connect.json.JsonConverter
internal.value.converter.schemas.enable=false

# ----- Internal Topics -----
config.storage.topic=connect-configs
config.storage.replication.factor=3

offset.storage.topic=connect-offsets
offset.storage.replication.factor=3
offset.storage.partitions=25

status.storage.topic=connect-status
status.storage.replication.factor=3
status.storage.partitions=5

# ----- Worker Configuration -----
offset.flush.interval.ms=10000
offset.flush.timeout.ms=25000
task.shutdown.graceful.timeout.ms=10000
worker.sync.timeout.ms=3000
worker.unsync.backoff.ms=300000

# ----- REST API -----
rest.host.name=0.0.0.0
rest.port=8083
rest.advertised.host.name=connect.zomato-data.internal
rest.advertised.port=8083

# ----- Producer overrides (for source connectors like Debezium) -----
producer.acks=all
producer.retries=2147483647
producer.retry.backoff.ms=500
producer.max.in.flight.requests.per.connection=1
producer.enable.idempotence=true
producer.compression.type=lz4
producer.batch.size=131072
producer.linger.ms=10
producer.buffer.memory=67108864
producer.max.request.size=10485760

# ----- Consumer overrides (for sink connectors) -----
consumer.auto.offset.reset=earliest
consumer.max.poll.records=2000
consumer.max.poll.interval.ms=900000
consumer.fetch.min.bytes=1
consumer.fetch.max.wait.ms=500
consumer.max.partition.fetch.bytes=10485760

# ----- Security (if SSL is enabled) -----
# security.protocol=SSL
# ssl.truststore.location=/etc/kafka-connect/ssl/truststore.jks
# ssl.truststore.password=${TRUSTSTORE_PASSWORD}
# ssl.keystore.location=/etc/kafka-connect/ssl/keystore.jks
# ssl.keystore.password=${KEYSTORE_PASSWORD}

# ----- Plugins -----
plugin.path=/usr/share/confluent-hub-components,/opt/kafka-connect-plugins

# ----- Monitoring -----
# JMX exporter for Prometheus
# KAFKA_JMX_OPTS=-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=9309:/opt/jmx_exporter/kafka-connect.yml

# ----- Debezium-specific recommended settings -----
# These ensure exactly-once CDC semantics:
# connector.client.config.override.policy=All
# Debezium connectors are deployed via REST API, see deployment scripts
