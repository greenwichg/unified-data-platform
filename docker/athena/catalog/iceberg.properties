# DEPRECATED: Trino replaced by Amazon Athena (serverless), and Hive Metastore
# replaced by AWS Glue Data Catalog. This config is kept for local dev only.
# In production, Athena uses the Glue Data Catalog natively for Iceberg tables.
connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hive-metastore:9083
hive.s3.endpoint=http://minio:9000
hive.s3.path-style-access=true
hive.s3.aws-access-key=minioadmin
hive.s3.aws-secret-key=minioadmin
iceberg.file-format=ORC
