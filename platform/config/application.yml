# Zomato Data Platform - Application Configuration
# Environment-specific values should be overridden via environment variables

platform:
  name: zomato-data-platform
  version: "1.0.0"

# Aurora MySQL (Pipeline 1 & 2 source)
aurora:
  host: ${AURORA_HOST}
  port: 3306
  database: zomato
  username: ${DB_USER}
  # Password must be provided via environment variable or Secrets Manager
  jdbc_url: "jdbc:mysql://${AURORA_HOST}:3306/zomato"

# Kafka Configuration
kafka:
  cluster_1:
    bootstrap_servers: ${MSK_BOOTSTRAP}
    description: "Primary Amazon MSK cluster for CDC and batch events"
    security_protocol: SASL_SSL
    sasl_mechanism: AWS_MSK_IAM
  cluster_2:
    bootstrap_servers: ${MSK_BOOTSTRAP_2}
    description: "Secondary Amazon MSK cluster for real-time events to Druid"
    security_protocol: SASL_SSL
    sasl_mechanism: AWS_MSK_IAM
  schema_registry:
    type: aws_glue
    registry_name: ${GLUE_REGISTRY_NAME:zomato-schema-registry}
    region: ${AWS_REGION:ap-south-1}
  topics:
    - name: orders
      partitions: 64
      replication_factor: 3
    - name: users
      partitions: 64
      replication_factor: 3
    - name: menu
      partitions: 64
      replication_factor: 3
    - name: promo
      partitions: 64
      replication_factor: 3
    - name: topics
      partitions: 64
      replication_factor: 3
    - name: druid-ingestion-events
      partitions: 64
      replication_factor: 3
    - name: order-spike-alerts
      partitions: 8
      replication_factor: 3

# S3 Data Lake
s3:
  raw_bucket: ${S3_RAW_BUCKET:zomato-data-platform-dev-raw-data-lake}
  processed_bucket: ${S3_PROCESSED_BUCKET:zomato-data-platform-dev-processed-data-lake}
  checkpoints_bucket: ${S3_CHECKPOINTS_BUCKET:zomato-data-platform-dev-checkpoints}

# Pipeline Configurations
pipelines:
  pipeline1_batch_etl:
    schedule: "0 */6 * * *"
    description: "Aurora MySQL → Sqoop → S3 (ORC)"
    tables:
      - orders
      - users
      - restaurants
      - menu_items
      - payments
      - promotions

  pipeline2_cdc:
    description: "Aurora MySQL → Debezium → Kafka → Flink → Iceberg/S3"
    debezium_connect_url: ${KAFKA_CONNECT_URL}
    flink_parallelism: 32
    checkpoint_interval_ms: 60000

  pipeline3_dynamodb_streams:
    schedule: "@hourly"
    description: "DynamoDB → Streams → S3 JSON → Spark (EMR) → ORC"
    emr_cluster_id: ${EMR_CLUSTER_ID:}
    spark_config:
      dynamic_allocation: true
      orc_compression: snappy

  pipeline4_realtime_events:
    description: "App Events → Kafka → Flink → S3 + Druid"
    flink_parallelism: 64
    checkpoint_interval_ms: 30000
    druid_datasource: zomato_realtime_events

# Amazon Athena Configuration (replaces self-hosted Trino)
athena:
  region: ${AWS_REGION:ap-south-1}
  workgroups:
    adhoc:
      name: ${ATHENA_ADHOC_WORKGROUP:zomato-adhoc}
      output_location: "s3://${S3_PROCESSED_BUCKET}/athena-results/adhoc/"
    etl:
      name: ${ATHENA_ETL_WORKGROUP:zomato-etl}
      output_location: "s3://${S3_PROCESSED_BUCKET}/athena-results/etl/"
    reporting:
      name: ${ATHENA_REPORTING_WORKGROUP:zomato-reporting}
      output_location: "s3://${S3_PROCESSED_BUCKET}/athena-results/reporting/"
  catalog: AwsDataCatalog

# Druid Configuration
druid:
  coordinator_url: ${DRUID_COORDINATOR_URL}
  broker_url: ${DRUID_BROKER_URL}
  datasources:
    - zomato_realtime_events

# Monitoring
monitoring:
  cloudwatch_namespace: zomato-data-platform
  alert_sns_topic: ${ALERT_SNS_TOPIC:}
  sla:
    pipeline1_max_lag_hours: 7
    pipeline2_max_lag_minutes: 10
    pipeline3_max_lag_hours: 2
    pipeline4_max_lag_minutes: 5
    druid_query_p99_ms: 5000
    kafka_max_consumer_lag: 1000000
