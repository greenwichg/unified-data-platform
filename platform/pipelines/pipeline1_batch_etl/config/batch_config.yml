# ============================================================================
# Pipeline 1 - Batch ETL Configuration
# Aurora MySQL -> Spark JDBC -> Iceberg/ORC -> S3
# Schedule: Every 6 hours via Airflow
# ============================================================================

pipeline:
  name: pipeline1_batch_etl
  description: "Batch ETL from Aurora MySQL to Iceberg/ORC data lake via Spark JDBC"
  schedule: "0 */6 * * *"
  owner: data-platform-team
  alert_channel: "#data-pipeline-alerts"

# ----- Source: Aurora MySQL -----
source:
  type: aurora_mysql
  jdbc_url: "jdbc:mysql://${AURORA_HOST}:3306/zomato"
  driver: "com.mysql.cj.jdbc.Driver"
  username: ${DB_USER}
  password_secret: "arn:aws:secretsmanager:ap-south-1:ACCOUNT_ID:secret:zomato/aurora/etl-user"
  connection_properties:
    useSSL: "true"
    requireSSL: "true"
    rewriteBatchedStatements: "true"
    cachePrepStmts: "true"
    prepStmtCacheSize: "250"
    useServerPrepStmts: "true"

  tables:
    - name: orders
      partition_column: order_id
      num_partitions: 32
      incremental_column: updated_at
      primary_key: order_id
      fetch_size: 10000
      decimal_columns: [subtotal, tax, delivery_fee, total_amount]
      null_check_columns: [order_id, user_id, restaurant_id, created_at]

    - name: users
      partition_column: user_id
      num_partitions: 16
      incremental_column: updated_at
      primary_key: user_id
      fetch_size: 5000
      null_check_columns: [user_id, email]

    - name: restaurants
      partition_column: restaurant_id
      num_partitions: 8
      incremental_column: updated_at
      primary_key: restaurant_id
      fetch_size: 5000
      null_check_columns: [restaurant_id, name, city]

    - name: menu_items
      partition_column: item_id
      num_partitions: 16
      incremental_column: updated_at
      primary_key: item_id
      fetch_size: 5000
      decimal_columns: [price]
      null_check_columns: [item_id, restaurant_id, name]

    - name: payments
      partition_column: payment_id
      num_partitions: 32
      incremental_column: updated_at
      primary_key: payment_id
      fetch_size: 10000
      decimal_columns: [amount]
      null_check_columns: [payment_id, order_id]

    - name: promotions
      partition_column: promo_id
      num_partitions: 8
      incremental_column: updated_at
      primary_key: promo_id
      fetch_size: 2000
      decimal_columns: [discount_value, min_order_value, max_discount]
      null_check_columns: [promo_id, code]

# ----- Destination: S3 Data Lake -----
destination:
  type: s3
  bucket: ${S3_RAW_BUCKET:zomato-data-platform-prod-raw-data-lake}
  iceberg:
    enabled: true
    catalog: iceberg
    database: zomato_raw
    warehouse: "s3://${S3_RAW_BUCKET}/iceberg"
    catalog_impl: "org.apache.iceberg.aws.glue.GlueCatalog"
    io_impl: "org.apache.iceberg.aws.s3.S3FileIO"
    table_properties:
      format-version: "2"
      write.format.default: orc
      write.orc.compression-codec: snappy
      write.orc.stripe-size-bytes: "268435456"
  orc_fallback:
    enabled: true
    base_path: "pipeline1-batch-etl/orc"
    compression: snappy
    stripe_size_mb: 256
    bloom_filter_columns: [order_id, user_id, restaurant_id]

# ----- Spark Settings -----
spark:
  master: yarn
  deploy_mode: cluster
  app_name: "Pipeline1-BatchETL"
  driver_memory: "4g"
  executor_memory: "8g"
  executor_cores: 4
  num_executors: 8
  jars:
    - "/usr/share/java/mysql-connector-java.jar"
    - "/usr/lib/iceberg/lib/iceberg-spark-runtime.jar"
  conf:
    spark.dynamicAllocation.enabled: "false"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.sql.adaptive.skewJoin.enabled: "true"
    spark.serializer: "org.apache.spark.serializer.KryoSerializer"
    spark.sql.orc.impl: "native"
    spark.sql.orc.enableVectorizedReader: "true"

# ----- Checkpointing -----
checkpoints:
  state_file: "/tmp/spark_jdbc_state.json"
  s3_backup:
    bucket: ${S3_CHECKPOINTS_BUCKET:zomato-data-platform-prod-checkpoints}
    prefix: "pipeline1-batch-etl/state"
  format: json

# ----- Quality Checks -----
quality:
  row_count_threshold: 0.8
  null_threshold_pct: 1.0
  freshness_max_hours: 7
  enable_schema_drift_detection: true
  fail_on_quality_error: false

# ----- Retry & Timeout -----
execution:
  max_retries: 3
  retry_delay_seconds: 300
  task_timeout_minutes: 120
  parallel_tables: 3
