###############################################################################
# Zomato Data Platform - Local Development Environment
# Simulates the full production architecture for local testing
###############################################################################

services:
  # ==================== Message Bus (Local Dev Only) ====================
  # PRODUCTION NOTE: In production, Amazon MSK (with IAM auth) replaces self-hosted
  # Kafka/ZooKeeper, and AWS Glue Schema Registry replaces Confluent Schema Registry.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_COMPRESSION_TYPE: lz4

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # PRODUCTION NOTE: In production, AWS Glue Schema Registry replaces Confluent Schema Registry.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    depends_on:
      - kafka-1
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # ==================== Kafka Connect (Debezium) ====================
  kafka-connect:
    image: debezium/connect:2.5
    hostname: kafka-connect
    depends_on:
      - kafka-1
      - schema-registry
      - mysql
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: zomato-connect
      BOOTSTRAP_SERVERS: kafka-1:29092
      CONFIG_STORAGE_TOPIC: debezium-configs
      OFFSET_STORAGE_TOPIC: debezium-offsets
      STATUS_STORAGE_TOPIC: debezium-status
      KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081

  # ==================== Databases ====================
  mysql:
    image: mysql:8.0
    hostname: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: zomato
      MYSQL_USER: zomato_app
      MYSQL_PASSWORD: zomato_pass
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d

  # ==================== Stream Processing ====================
  flink-jobmanager:
    image: flink:1.18-java17
    hostname: flink-jobmanager
    ports:
      - "8084:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        execution.checkpointing.interval: 10000
        parallelism.default: 2

  flink-taskmanager:
    image: flink:1.18-java17
    hostname: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 4gb

  # ==================== Query Engine (Local Dev Only) ====================
  # PRODUCTION NOTE: In production, Amazon Athena (serverless) replaces Trino,
  # and AWS Glue Data Catalog replaces Hive Metastore.
  trino:
    image: trinodb/trino:435
    hostname: trino
    ports:
      - "8085:8080"
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog
      - ./docker/trino/config.properties:/etc/trino/config.properties

  # ==================== Real-time OLAP ====================
  druid-coordinator:
    image: apache/druid:29.0.0
    hostname: druid-coordinator
    ports:
      - "8086:8081"
    command: coordinator
    environment:
      DRUID_COMMON_RUNTIME_PROPERTIES: |
        druid.metadata.storage.type=derby
        druid.metadata.storage.connector.connectURI=jdbc:derby://localhost:1527/var/druid/metadata.db;create=true
        druid.storage.type=local
        druid.storage.storageDirectory=/opt/druid/var/druid/segments
        druid.indexer.logs.type=file
        druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs

  druid-broker:
    image: apache/druid:29.0.0
    hostname: druid-broker
    ports:
      - "8888:8888"
    command: broker
    depends_on:
      - druid-coordinator

  # ==================== Orchestration ====================
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    hostname: airflow-webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Kolkata
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    hostname: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname User --role Admin --email admin@zomato.com"

  # ==================== Dashboards ====================
  superset:
    image: apache/superset:3.1.0
    hostname: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "zomato-superset-secret-key-change-in-prod"
    depends_on:
      - trino
      - druid-broker

  # ==================== Object Storage (S3 mock) ====================
  minio:
    image: minio/minio:latest
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/zomato-data-platform-dev-raw-data-lake --ignore-existing;
      mc mb local/zomato-data-platform-dev-processed-data-lake --ignore-existing;
      mc mb local/zomato-data-platform-dev-checkpoints --ignore-existing;
      echo 'MinIO buckets created';
      "

volumes:
  mysql_data:
  minio_data:
  airflow_logs:
