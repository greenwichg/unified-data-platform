###############################################################################
# Zomato Data Platform - Local Development Environment
# Simulates the full production architecture for local testing
###############################################################################

services:
  # ==================== Message Bus (Local Dev Only) ====================
  # PRODUCTION NOTE: In production, Amazon MSK (with IAM auth) replaces self-hosted
  # Kafka/ZooKeeper, and AWS Glue Schema Registry replaces Confluent Schema Registry.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_COMPRESSION_TYPE: lz4
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # PRODUCTION NOTE: In production, AWS Glue Schema Registry replaces Confluent Schema Registry.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    depends_on:
      - kafka-1
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # ==================== Kafka Connect (Debezium) ====================
  kafka-connect:
    image: debezium/connect:2.5
    hostname: kafka-connect
    depends_on:
      - kafka-1
      - schema-registry
      - mysql
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: zomato-connect
      BOOTSTRAP_SERVERS: kafka-1:29092
      CONFIG_STORAGE_TOPIC: debezium-configs
      OFFSET_STORAGE_TOPIC: debezium-offsets
      STATUS_STORAGE_TOPIC: debezium-status
      KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # Registers Debezium CDC connectors once kafka-connect is healthy.
  # Runs once and exits — re-run with: docker-compose run --rm connect-init
  connect-init:
    image: curlimages/curl:8.6.0
    depends_on:
      kafka-connect:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      KAFKA_BOOTSTRAP: kafka-1:29092
    volumes:
      - ./infra/scripts:/scripts
    entrypoint: ["sh", "/scripts/register-connectors.sh"]
    restart: "no"

  # ==================== Databases ====================
  mysql:
    image: mysql:8.0
    hostname: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: zomato
      MYSQL_USER: ${MYSQL_USER:-zomato_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zomato_pass}
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/scripts/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== Stream Processing ====================
  flink-jobmanager:
    image: flink:1.18-java17
    hostname: flink-jobmanager
    ports:
      - "8084:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        execution.checkpointing.interval: 10000
        parallelism.default: 2

  flink-taskmanager:
    image: flink:1.18-java17
    hostname: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 4gb

  # ==================== Query Engine (Local Dev Only) ====================
  # PRODUCTION NOTE: In production, Amazon Athena (serverless) replaces Trino,
  # and AWS Glue Data Catalog replaces Hive Metastore.
  trino:
    image: trinodb/trino:435
    hostname: trino
    ports:
      - "8085:8080"
    volumes:
      - ./infra/docker/athena/catalog:/etc/trino/catalog
      - ./infra/docker/athena/config.properties:/etc/trino/config.properties

  # ==================== Real-time OLAP ====================
  druid-coordinator:
    image: apache/druid:29.0.0
    hostname: druid-coordinator
    ports:
      - "8086:8081"
    command: coordinator
    environment:
      DRUID_COMMON_RUNTIME_PROPERTIES: |
        druid.metadata.storage.type=derby
        druid.metadata.storage.connector.connectURI=jdbc:derby://localhost:1527/var/druid/metadata.db;create=true
        druid.storage.type=local
        druid.storage.storageDirectory=/opt/druid/var/druid/segments
        druid.indexer.logs.type=file
        druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs

  druid-broker:
    image: apache/druid:29.0.0
    hostname: druid-broker
    ports:
      - "8888:8888"
    command: broker
    depends_on:
      - druid-coordinator

  # ==================== Orchestration ====================
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    hostname: airflow-webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Kolkata
    volumes:
      - ./platform/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    hostname: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./platform/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname User --role Admin --email admin@zomato.com"

  # ==================== Dashboards ====================
  superset:
    image: apache/superset:3.1.0
    hostname: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-change-me-in-production}"
    depends_on:
      - trino
      - druid-broker

  # ==================== Object Storage (S3 mock) ====================
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-03-13T23-51-57Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/zomato-data-platform-dev-raw-data-lake --ignore-existing;
      mc mb local/zomato-data-platform-dev-processed-data-lake --ignore-existing;
      mc mb local/zomato-data-platform-dev-checkpoints --ignore-existing;
      echo 'MinIO buckets created';
      "

  # ==================== Seed Data (runs once on startup) ====================
  seed:
    image: python:3.11-slim
    depends_on:
      mysql:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DB: zomato
      DYNAMODB_ENDPOINT: ""
      KAFKA_BOOTSTRAP: kafka-1:29092
    volumes:
      - ./infra/scripts:/scripts
    command: >
      bash -c "pip install pymysql confluent-kafka --quiet &&
               python /scripts/seed_data.py"
    restart: "no"

  # ==================== Real-time Producer (opt-in via --profile produce) ==
  # Usage:
  #   docker-compose --profile produce up producer          # 5 events/sec (default)
  #   PRODUCE_RATE=23 docker-compose --profile produce up producer   # ~2M orders/day
  #   PRODUCE_RATE=10 PRODUCE_DURATION=600 docker-compose --profile produce up producer
  #   PRODUCE_TARGET=kafka docker-compose --profile produce up producer
  producer:
    image: python:3.11-slim
    profiles: [produce]
    depends_on:
      mysql:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DB: zomato
      DYNAMODB_ENDPOINT: ""
      KAFKA_BOOTSTRAP: kafka-1:29092
      PRODUCE_RATE: ${PRODUCE_RATE:-5}
      PRODUCE_TARGET: ${PRODUCE_TARGET:-all}
      PRODUCE_DURATION: ${PRODUCE_DURATION:-}
    volumes:
      - ./infra/scripts:/scripts
    command: >
      bash -c "pip install pymysql confluent-kafka --quiet &&
               python /scripts/produce_realtime.py
                 --target $${PRODUCE_TARGET}
                 --rate $${PRODUCE_RATE}
                 $${PRODUCE_DURATION:+--duration $${PRODUCE_DURATION}}"
    restart: on-failure

volumes:
  mysql_data:
  minio_data:
  airflow_logs:
