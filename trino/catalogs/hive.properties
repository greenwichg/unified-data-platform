# NOTE: Catalog configuration is now handled by Athena data sources and Glue Data Catalog.
# ============================================================================
# Zomato Data Platform - Hive Connector Configuration
# Connects Trino to the Hive Metastore and S3 data lake
# ============================================================================

connector.name=hive

# ----- Hive Metastore -----
hive.metastore.uri=thrift://hive-metastore.prod.internal:9083
hive.config.resources=/etc/trino/core-site.xml

# ----- Schema Modification Permissions -----
hive.allow-drop-table=true
hive.allow-rename-table=true
hive.allow-add-column=true
hive.allow-drop-column=true
hive.allow-rename-column=true
hive.non-managed-table-writes-enabled=true

# ----- S3 Storage Configuration -----
hive.s3.path-style-access=true
hive.s3.ssl.enabled=true
hive.s3.endpoint=https://s3.ap-south-1.amazonaws.com

# S3 Server-Side Encryption (SSE-S3: S3-managed keys)
hive.s3.sse.enabled=true
hive.s3.sse.type=S3

# Credentials - prefer IAM role; keys left empty for instance-profile auth
hive.s3.aws-access-key=
hive.s3.aws-secret-key=
hive.s3.iam-role=

# S3 performance tuning
hive.s3.max-connections=500
hive.s3.multipart.min-file-size=16MB
hive.s3.multipart.min-part-size=8MB
hive.s3.upload-acl-type=PRIVATE
hive.s3.skip-glacier-objects=true

# ----- Directory Listing -----
hive.recursive-directories=true
hive.max-partitions-per-scan=100000
hive.max-partitions-for-eager-load=100000

# ----- Metastore Caching -----
# Cache metastore metadata aggressively to reduce HMS round-trips
hive.metastore-cache-ttl=1h
hive.metastore-refresh-interval=30m
hive.metastore-cache-maximum-size=10000
hive.per-transaction-metastore-cache-maximum-size=2000

# ----- Storage Format Defaults -----
hive.storage-format=ORC
hive.compression-codec=ZSTD

# ----- ORC Configuration -----
hive.orc.use-column-names=true
hive.orc.bloom-filter-columns=order_id,customer_id,restaurant_id,rider_id
hive.orc.default-bloom-filter-fpp=0.05
hive.orc.max-merge-distance=1MB
hive.orc.max-buffer-size=8MB
hive.orc.stream-buffer-size=8MB
hive.orc.tiny-stripe-threshold=8MB
hive.orc.lazy-read-small-ranges=true
hive.orc.nested-lazy-enabled=true

# ----- Parquet Configuration -----
hive.parquet.use-column-names=true
hive.parquet.max-read-block-size=16MB
hive.parquet.optimized-reader.enabled=true
hive.parquet.optimized-nested-reader.enabled=true

# ----- Partition Projection -----
hive.partition-projection-enabled=true

# ----- Dynamic Filtering -----
# Push filter predicates down to file readers for faster scans
hive.dynamic-filtering.wait-timeout=30s

# ----- File System Cache -----
hive.file-status-cache-tables=raw.*,curated.*
hive.file-status-cache.max-retained-size=100MB
hive.file-status-cache-expire-time=30m

# ----- Write Settings -----
hive.target-max-file-size=1GB
hive.max-open-sort-files=200
hive.write-validation-percentage=0
