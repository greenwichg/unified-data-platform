connector.name=hive
hive.metastore.uri=thrift://hive-metastore.prod.internal:9083
hive.config.resources=/etc/trino/core-site.xml
hive.allow-drop-table=true
hive.allow-rename-table=true
hive.allow-add-column=true
hive.allow-drop-column=true
hive.allow-rename-column=true
hive.non-managed-table-writes-enabled=true
hive.s3.path-style-access=false
hive.s3.ssl.enabled=true
hive.s3.sse.enabled=true
hive.s3.sse.type=S3
hive.s3.endpoint=https://s3.ap-south-1.amazonaws.com
hive.s3.aws-access-key=
hive.s3.aws-secret-key=
hive.s3.iam-role=
hive.parquet.use-column-names=true
hive.orc.use-column-names=true
hive.storage-format=ORC
hive.compression-codec=ZSTD
hive.recursive-directories=true
hive.max-partitions-per-scan=100000
hive.metastore-cache-ttl=2m
hive.metastore-refresh-interval=1m
