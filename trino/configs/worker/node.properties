# NOTE: Trino is replaced by Amazon Athena (serverless). These configs are kept for reference.
# ============================================================================
# Zomato Data Platform - Trino Worker Node Properties
# Environment: Production
# ============================================================================

# Node environment - must match the coordinator's node.environment exactly
node.environment=production

# Unique node identifier
# IMPORTANT: Each worker MUST have a globally unique node.id.
# In containerized deployments, use the hostname or a generated UUID.
# For bare-metal, generate once with: uuidgen | tr '[:upper:]' '[:lower:]'
# node.id is typically injected via environment variable or init script.

# Data directory for local storage (spill files, temp data, exchange spool)
node.data-dir=/var/trino/data

# Log file locations
node.server-log-file=/var/log/trino/server.log
node.launcher-log-file=/var/log/trino/launcher.log

# Catalog configuration directory
catalog.config-dir=/etc/trino/catalog

# Plugin directory
plugin.dir=/usr/lib/trino/plugin

# Location hint for rack-aware scheduling and data locality optimization
# Populated by Ansible/Terraform based on instance placement
# node.location=/ap-south-1/{{ availability_zone }}/{{ rack_id }}
