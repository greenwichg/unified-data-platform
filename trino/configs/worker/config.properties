# ============================================================================
# Zomato Data Platform - Trino Worker Configuration
# Instance type: r6i.8xlarge (32 vCPU, 256 GB RAM)
# JVM heap: ~200 GB (remaining for OS, off-heap, and page cache)
# ============================================================================

# ----- Role -----
coordinator=false
http-server.http.port=8080
http-server.http.enabled=true

# ----- Discovery - point to coordinator -----
discovery.uri=http://trino-coordinator.zomato-data.internal:8080

# ----- Query Memory Limits (per worker) -----
# Max memory a single query can use across the entire cluster
query.max-memory=50GB
# Max memory a single query can use on this worker node
query.max-memory-per-node=25GB
# Max total memory (user + system) a single query can use per node
query.max-total-memory-per-node=45GB

# ----- Heap Headroom -----
# Reserved memory for JVM internals, GC overhead, and native allocations
memory.heap-headroom-per-node=8GB

# ----- Task Configuration -----
# Workers are compute-heavy; tune concurrency to saturate CPU
task.max-worker-threads=32
task.http-response-threads=100
task.concurrency=64
task.writer-count=4
task.min-drivers=32
task.min-drivers-per-task=3
task.max-drivers-per-task=128

# ----- Exchange Configuration -----
exchange.client-threads=25
exchange.http-client.max-connections=250
exchange.http-client.max-connections-per-server=250
exchange.concurrent-request-multiplier=3
exchange.compression-enabled=true

# ----- Spill to Disk -----
# Enable spill for memory-intensive operations (joins, aggregations, sorts)
spill-enabled=true
spiller-spill-path=/data/trino/spill
spiller-max-used-space-threshold=0.7
spill-compression-enabled=true
spill-encryption-enabled=false
max-spill-per-node=200GB
query-max-spill-per-node=50GB

# ----- Fault-Tolerant Execution -----
# Retry at the task level for resilience against transient failures
retry-policy=TASK
task-retry-attempts-per-task=3
retry-initial-delay=10s
retry-max-delay=1m
retry-delay-scale-factor=2.0

# ----- Exchange Manager (for fault-tolerant execution) -----
exchange-manager.name=filesystem
exchange.base-directories=/data/trino/exchange-spool

# ----- Security -----
internal-communication.shared-secret=REPLACE_WITH_SECRET

# ----- JMX for Monitoring -----
jmx.rmiregistry.port=9080
jmx.rmiserver.port=9081

# ----- Graceful Shutdown -----
shutdown.grace-period=120s
