# ============================================================================
# Zomato Data Platform - Druid Broker Runtime Properties
# The broker receives queries, fans them out to historicals/realtime, merges.
# Deployed: 4 instances on r6g.2xlarge (8 vCPU, 64 GB) behind internal ALB
# Handles 8M queries/week with sub-second p99 latency target.
# ============================================================================

druid.service=druid/broker
druid.plaintextPort=8082
druid.host=${DRUID_BROKER_HOST}

# ----- JVM Tuning -----
# Set via JVM_OPTS: -Xms12g -Xmx12g -XX:MaxDirectMemorySize=24g

# ----- Processing -----
# 1GB buffer per thread for large groupBy/topN merges across Zomato's high-cardinality dimensions
druid.processing.buffer.sizeBytes=1073741824
druid.processing.numMergeBuffers=6
# 31 processing threads = (vCPUs * cores-per-instance factor) - 1 for optimal parallelism
druid.processing.numThreads=31
druid.processing.tmpDir=/tmp/druid/processing
druid.processing.formatString=processing-%s

# ----- Query Cache (LRU local cache) -----
druid.broker.cache.useCache=true
druid.broker.cache.populateCache=true
druid.broker.cache.useResultLevelCache=true
druid.broker.cache.populateResultLevelCache=true
# LRU cache strategy - 500MB dedicated to result-level caching for repeated dashboard queries
druid.cache.type=local
druid.cache.sizeInBytes=524288000
druid.cache.initialSize=500000
druid.cache.logEvictionCount=10000

# ----- HTTP -----
# 40 HTTP threads to handle concurrent dashboard + API queries from Zomato services
druid.server.http.numThreads=40
druid.server.http.maxIdleTime=PT5M
druid.server.http.gracefulShutdownTimeout=PT30S

# ----- Broker-specific -----
# Connection pool: 20 connections per historical/realtime node for fan-out
druid.broker.http.numConnections=20
# 25MB max queued bytes to back-pressure when historicals are saturated
druid.broker.http.maxQueuedBytes=25000000
# 5-minute query timeout aligns with ALB idle timeout and SLA budget
druid.broker.http.readTimeout=PT5M
druid.broker.retryPolicy.numTries=3

# ----- Connection Pool Tuning -----
druid.broker.http.eagerInitialization=true
druid.global.http.numConnections=20
druid.global.http.eagerInitialization=true

# ----- Query Timeout -----
# Hard timeout at 5 minutes - kills runaway ad-hoc queries before they impact cluster
druid.server.http.defaultQueryTimeout=300000

# ----- SQL -----
druid.sql.enable=true
druid.sql.planner.maxTopNLimit=100000
druid.sql.planner.useApproximateCountDistinct=true
druid.sql.planner.useApproximateTopN=true
druid.sql.planner.requireTimeCondition=false

# ----- Query Priority & Laning -----
druid.query.scheduler.numThreads=60
druid.query.scheduler.laning.type=manual
druid.query.scheduler.laning.lanes={"interactive":30,"batch":20,"system":10}
druid.query.scheduler.prioritization.type=manual
druid.query.scheduler.prioritization.adjustment=10

# ----- Monitoring -----
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor", "org.apache.druid.server.metrics.QueryCountStatsMonitor"]
