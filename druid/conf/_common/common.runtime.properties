# ============================================================================
# Zomato Data Platform - Apache Druid Common Runtime Properties
# Shared across all Druid services (coordinator, broker, historical, etc.)
# ============================================================================

# ----- Extensions -----
druid.extensions.loadList=["druid-kafka-indexing-service", "druid-s3-extensions", "druid-avro-extensions", "druid-lookups-cached-global", "druid-histogram", "druid-datasketches", "druid-parquet-extensions", "mysql-metadata-storage", "druid-basic-security", "druid-multi-stage-query"]

# ----- Zookeeper -----
druid.zk.service.host=zk1.zomato-data.internal:2181,zk2.zomato-data.internal:2181,zk3.zomato-data.internal:2181
druid.zk.paths.base=/druid/prod
druid.zk.service.sessionTimeoutMs=30000
druid.zk.service.compress=true

# ----- Metadata Storage (Aurora MySQL) -----
druid.metadata.storage.type=mysql
druid.metadata.storage.connector.connectURI=jdbc:mysql://druid-metadata.cluster-xxxxxxxxxxxx.ap-south-1.rds.amazonaws.com:3306/druid_metadata
druid.metadata.storage.connector.user=${DRUID_METADATA_DB_USER}
druid.metadata.storage.connector.password=${DRUID_METADATA_DB_PASSWORD}
druid.metadata.storage.connector.createTables=true
druid.metadata.storage.connector.dbcp.maxActive=20
druid.metadata.storage.connector.dbcp.maxIdle=5
druid.metadata.storage.connector.dbcp.minIdle=2
druid.metadata.storage.connector.dbcp.validationQuery=SELECT 1

# ----- Deep Storage (S3) -----
druid.storage.type=s3
druid.storage.bucket=zomato-data-platform-prod-druid-segments
druid.storage.baseKey=druid/segments
druid.s3.accessKey=${AWS_ACCESS_KEY_ID}
druid.s3.secretKey=${AWS_SECRET_ACCESS_KEY}
druid.s3.protocol=https
druid.s3.sse.type=s3
druid.s3.endpoint.signingRegion=ap-south-1

# ----- Indexing Log Storage (S3) -----
druid.indexer.logs.type=s3
druid.indexer.logs.s3Bucket=zomato-data-platform-prod-druid-segments
druid.indexer.logs.s3Prefix=druid/indexing-logs

# ----- Service Discovery -----
druid.selectors.indexing.serviceName=druid/overlord
druid.selectors.coordinator.serviceName=druid/coordinator

# ----- Monitoring & Metrics -----
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor", "org.apache.druid.java.util.metrics.JvmCpuMonitor", "org.apache.druid.java.util.metrics.JvmThreadsMonitor"]
druid.emitter=composing
druid.emitter.composing.emitters=["logging", "http"]
druid.emitter.logging.logLevel=info
druid.emitter.http.recipientBaseUrl=http://druid-exporter.zomato-data.internal:8080/druid

# ----- SQL -----
druid.sql.enable=true
druid.sql.planner.useApproximateCountDistinct=true
druid.sql.planner.useApproximateTopN=true

# ----- Security (Basic Auth) -----
druid.auth.authenticatorChain=["basic"]
druid.auth.authenticator.basic.type=basic
druid.auth.authenticator.basic.initialAdminPassword=${DRUID_ADMIN_PASSWORD}
druid.auth.authenticator.basic.initialInternalClientPassword=${DRUID_INTERNAL_CLIENT_PASSWORD}
druid.auth.authenticator.basic.credentialsValidator.type=metadata
druid.auth.authenticator.basic.skipOnFailure=false
druid.auth.authenticator.basic.authorizerName=basic
druid.auth.authorizers=["basic"]
druid.auth.authorizer.basic.type=basic
druid.escalator.type=basic
druid.escalator.internalClientUsername=druid_internal
druid.escalator.internalClientPassword=${DRUID_INTERNAL_CLIENT_PASSWORD}
druid.escalator.authorizerName=basic

# ----- Request Logging -----
druid.request.logging.type=composing
druid.request.logging.loggers=["file", "slf4j"]
druid.request.logging.file.dir=/var/log/druid/requests
druid.request.logging.file.filePattern=request-%Y%m%d.log

# ----- Lookup Configuration -----
druid.lookup.enableLookupSyncOnStartup=true
druid.lookup.numLookupLoadingThreads=2
