# ============================================================================
# Zomato Data Platform - Druid Middle Manager Runtime Properties
# Middle managers run indexing tasks (Kafka ingestion, compaction, etc.)
# Deployed: 8 instances on r6g.4xlarge (16 vCPU, 128 GB)
# Handles Kafka supervisor tasks for real-time ingestion of 20B events/week.
# ============================================================================

druid.service=druid/middleManager
druid.plaintextPort=8091
druid.host=${DRUID_MIDDLEMANAGER_HOST}

# ----- JVM Tuning (Middle Manager process) -----
# Set via JVM_OPTS: -Xms512m -Xmx512m

# ----- Worker Configuration -----
druid.worker.ip=${DRUID_MIDDLEMANAGER_HOST}
druid.worker.capacity=8
druid.worker.category=_default_worker
druid.worker.version=0

# ----- Task (Peon) JVM Configuration -----
druid.indexer.runner.type=local
druid.indexer.runner.javaOptsArray=["-server", "-Xms4g", "-Xmx4g", "-XX:MaxDirectMemorySize=6g", "-XX:+UseG1GC", "-XX:MaxGCPauseMillis=100", "-XX:+ExitOnOutOfMemoryError", "-Duser.timezone=UTC", "-Dfile.encoding=UTF-8"]
druid.indexer.runner.maxZnodeBytes=524288

# ----- Task Configuration -----
druid.indexer.task.baseTaskDir=/var/druid/task
druid.indexer.task.defaultHadoopCoordinates=["org.apache.hadoop:hadoop-client:3.3.4"]
druid.indexer.task.chathandler.type=announce
druid.indexer.task.restoreTasksOnRestart=true

# ----- Peon Processing -----
druid.peon.mode=remote
druid.indexer.fork.property.druid.processing.numMergeBuffers=2
druid.indexer.fork.property.druid.processing.numThreads=2
druid.indexer.fork.property.druid.processing.buffer.sizeBytes=268435456

# ----- Peon Monitoring -----
druid.indexer.fork.property.druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor"]

# ----- Peon HTTP -----
druid.indexer.fork.property.druid.server.http.numThreads=12

# ----- S3 Task Logs -----
druid.indexer.logs.type=s3
druid.indexer.logs.s3Bucket=zomato-data-platform-prod-druid-segments
druid.indexer.logs.s3Prefix=druid/task-logs

# ----- HTTP -----
druid.server.http.numThreads=25
druid.server.http.maxIdleTime=PT5M
