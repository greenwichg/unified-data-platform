# ============================================================================
# Zomato Data Platform - Druid Historical Runtime Properties
# Historicals serve immutable, compressed segments from deep storage.
# Deployed: 12 instances on i3.4xlarge (16 vCPU, 122 GB, 2x 1.9TB NVMe SSD)
# Serves the bulk of Zomato's 20B events/week analytical queries.
# ============================================================================

druid.service=druid/historical
druid.plaintextPort=8083
druid.host=${DRUID_HISTORICAL_HOST}

# ----- JVM Tuning -----
# Set via JVM_OPTS: -Xms16g -Xmx16g -XX:MaxDirectMemorySize=60g

# ----- Processing -----
# 1GB buffer per processing thread for large groupBy merges on Zomato order data
druid.processing.buffer.sizeBytes=1073741824
# 6 merge buffers (1GB each) for concurrent groupBy v2 merges
druid.processing.numMergeBuffers=6
druid.processing.merge.buffer.sizeBytes=1073741824
# 31 processing threads = (vCPUs across numa nodes) - 1 for query parallelism
druid.processing.numThreads=31
druid.processing.tmpDir=/mnt/nvme0/druid/processing-tmp
druid.processing.formatString=processing-%s

# ----- Segment Cache (3 NVMe SSD paths, 1TB each) -----
# Spread segments across 3 NVMe paths for maximum I/O parallelism
druid.segmentCache.locations=[{"path":"/mnt/nvme0/druid/segment-cache","maxSize":"1000g","freeSpacePercent":"5.0"},{"path":"/mnt/nvme1/druid/segment-cache","maxSize":"1000g","freeSpacePercent":"5.0"},{"path":"/mnt/nvme2/druid/segment-cache","maxSize":"1000g","freeSpacePercent":"5.0"}]
druid.segmentCache.numLoadingThreads=8
druid.segmentCache.deleteOnRemove=true
druid.segmentCache.dropSegmentDelayMillis=30000
druid.segmentCache.lazyLoadOnStart=true
druid.segmentCache.numBootstrapThreads=8
# Prefetch segments from deep storage to minimize cold-start latency
druid.segmentCache.numThreadsToLoadSegmentsIntoPageCacheOnDownload=4
druid.segmentCache.numThreadsToLoadSegmentsIntoPageCacheOnBootstrap=2

# ----- Historical Tier -----
druid.server.tier=_default_tier
druid.server.priority=0
# 3TB max size per tier = 3 NVMe x 1TB each
druid.server.maxSize=3298534883328

# ----- HTTP -----
# 25 HTTP threads - broker fan-out connections per historical
druid.server.http.numThreads=25
druid.server.http.maxIdleTime=PT5M
druid.server.http.gracefulShutdownTimeout=PT30S

# ----- Query Cache (segment-level) -----
druid.historical.cache.useCache=true
druid.historical.cache.populateCache=true
druid.cache.type=caffeine
druid.cache.sizeInBytes=4294967296
druid.cache.expireAfter=7200000

# ----- Monitoring -----
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor", "org.apache.druid.server.metrics.HistoricalMetricsMonitor", "org.apache.druid.server.metrics.QueryCountStatsMonitor"]

# ----- Performance Tuning -----
druid.query.groupBy.maxMergingDictionarySize=500000000
druid.query.groupBy.maxOnDiskStorage=2147483648
druid.query.topN.minTopNThreshold=1000
