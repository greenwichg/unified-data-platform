# Pipeline 1 - Sqoop Table Configuration
# Tables imported from Aurora MySQL to S3 as ORC via Sqoop.
# Schedule: every 6 hours via Airflow.
#
# Fields:
#   table              - Aurora MySQL table name
#   split_by           - Column used for parallel import (--split-by)
#   num_mappers        - Number of parallel map tasks
#   incremental_column - Column for lastmodified incremental imports
#   check_column       - Same as incremental_column (used by Sqoop --check-column)
#   merge_key          - Primary key used for merge in incremental mode

tables:
  - table: orders
    split_by: order_id
    num_mappers: 16
    incremental_column: updated_at
    check_column: updated_at
    merge_key: order_id
    columns: >
      order_id, user_id, restaurant_id, status, subtotal, tax,
      delivery_fee, total_amount, payment_method, delivery_address,
      city, latitude, longitude, created_at, updated_at

  - table: menu_items
    split_by: item_id
    num_mappers: 8
    incremental_column: updated_at
    check_column: updated_at
    merge_key: item_id
    columns: >
      item_id, restaurant_id, name, description, category,
      cuisine_type, price, is_vegetarian, is_vegan, is_available,
      preparation_time_mins, rating, num_ratings, image_url,
      created_at, updated_at

  - table: restaurants
    split_by: restaurant_id
    num_mappers: 4
    incremental_column: updated_at
    check_column: updated_at
    merge_key: restaurant_id
    columns: >
      restaurant_id, name, owner_id, city, area, address,
      latitude, longitude, cuisine_types, avg_rating,
      total_reviews, is_active, opening_time, closing_time,
      avg_delivery_time_mins, delivery_radius_km,
      created_at, updated_at

  - table: users
    split_by: user_id
    num_mappers: 8
    incremental_column: updated_at
    check_column: updated_at
    merge_key: user_id
    columns: >
      user_id, name, email, phone, city, signup_date,
      is_pro_member, total_orders, total_spend, preferred_cuisine,
      preferred_payment_method, created_at, updated_at

  - table: promos
    split_by: promo_id
    num_mappers: 4
    incremental_column: updated_at
    check_column: updated_at
    merge_key: promo_id
    columns: >
      promo_id, code, description, discount_type, discount_value,
      min_order_value, max_discount, start_date, end_date,
      applicable_cities, applicable_restaurants, usage_limit,
      usage_count, is_active, created_at, updated_at
