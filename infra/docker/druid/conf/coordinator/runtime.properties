# ============================================================================
# Zomato Data Platform - Druid Coordinator Runtime Properties
# The coordinator manages data availability and segment lifecycle.
# Deployed: 2 instances (active/standby) on r8g.xlarge (4 vCPU, 32 GB)
# ============================================================================

druid.service=druid/coordinator
druid.plaintextPort=8081
druid.host=${DRUID_COORDINATOR_HOST}

# ----- JVM Tuning -----
# Set via JVM_OPTS: -Xms8g -Xmx8g -XX:MaxDirectMemorySize=256m

# ----- Coordinator Configuration -----
druid.coordinator.startDelay=PT60S
# PT30S run period ensures segment assignments converge quickly during deployments
druid.coordinator.period=PT30S

# ----- Kill Rules for Unused Segments -----
# Automatically remove unused segments older than 90 days from deep storage
druid.coordinator.kill.on=true
druid.coordinator.kill.period=PT1H
druid.coordinator.kill.durationToRetain=P90D
druid.coordinator.kill.maxSegments=1000
# Kill audit and rules entries older than 90 days
druid.coordinator.kill.audit.on=true
druid.coordinator.kill.audit.period=PT1H
druid.coordinator.kill.audit.durationToRetain=P90D
druid.coordinator.kill.rules.on=true
druid.coordinator.kill.rules.period=PT1H
druid.coordinator.kill.rules.durationToRetain=P90D
druid.coordinator.kill.datasources.on=true
druid.coordinator.kill.datasources.period=PT1H
druid.coordinator.kill.datasources.durationToRetain=P90D

# ----- Overlord Integration (combined coordinator-overlord mode) -----
# Run coordinator and overlord in the same JVM to reduce operational overhead
druid.coordinator.asOverlord.enabled=true
druid.coordinator.asOverlord.overlordService=druid/overlord

# ----- Indexing Service -----
druid.indexer.runner.type=remote
druid.indexer.storage.type=metadata

# ----- Load/Drop Queue -----
druid.coordinator.loadqueuepeon.type=curator
druid.coordinator.loadqueuepeon.repeatDelay=PT0.050S

# ----- Merge Buffer (for coordinator-level merges) -----
druid.processing.buffer.sizeBytes=268435456
druid.processing.numMergeBuffers=2
druid.processing.numThreads=1

# ----- Compaction Duty -----
druid.coordinator.compaction.skipLockedIntervals=true

# ----- Balancer Strategy -----
# cachingCost strategy caches segment cost calculations for faster balancing decisions
# across 12 historicals with 3TB each (~36TB total segment footprint)
druid.coordinator.balancer.strategy=cachingCost

# ----- HTTP -----
druid.server.http.numThreads=25
druid.server.http.maxIdleTime=PT5M
druid.server.http.gracefulShutdownTimeout=PT30S

# ----- Audit Logging -----
# Log-based audit manager writes to structured log for Fluentd collection
druid.audit.manager.type=log
druid.audit.manager.logLevel=INFO
druid.audit.manager.auditHistoryMillis=604800000
druid.audit.manager.includePayloadAsDimensionInMetric=true

# ----- Monitoring -----
druid.monitoring.monitors=["org.apache.druid.java.util.metrics.JvmMonitor", "org.apache.druid.server.metrics.TaskCountStatsMonitor"]
