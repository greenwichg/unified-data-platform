# NOTE: Trino is replaced by Amazon Athena (serverless). These configs are kept for reference.
# ============================================================================
# Zomato Data Platform - Trino Coordinator Node Properties
# Environment: Production
# ============================================================================

# Node environment - must match across all coordinator and worker nodes
node.environment=production

# Unique node identifier
# For production, generate a UUID per node: uuidgen | tr '[:upper:]' '[:lower:]'
# This value MUST be unique across the entire Trino cluster and persist across restarts.
node.id=trino-coordinator-001

# Data directory for storing metadata, temp files, and local spill
node.data-dir=/var/trino/data

# Log file locations
node.server-log-file=/var/log/trino/server.log
node.launcher-log-file=/var/log/trino/launcher.log

# Catalog configuration directory - holds *.properties files for each connector
catalog.config-dir=/etc/trino/catalog

# Plugin directory - contains connector JARs and UDF extensions
plugin.dir=/usr/lib/trino/plugin

# Internal communication address (used for node-to-node discovery)
# Leave unset to auto-detect from network interfaces; set explicitly if multi-homed.
# node.internal-address=trino-coordinator.zomato-data.internal

# Additional node metadata for resource group routing and scheduling
node.location=/ap-south-1/az-a/rack-01
