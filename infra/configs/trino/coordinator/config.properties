# NOTE: Trino is replaced by Amazon Athena (serverless). These configs are kept for reference.
coordinator=true
node-scheduler.include-coordinator=false
http-server.http.port=8080
http-server.http.enabled=true

# Discovery
discovery-server.enabled=true
discovery.uri=http://localhost:8080

# Query limits
query.max-memory=50GB
query.max-memory-per-node=8GB
query.max-total-memory-per-node=10GB
query.max-stage-count=150
query.max-execution-time=30m
query.max-run-time=60m

# Task configuration
task.max-worker-threads=16
task.http-response-threads=100
task.concurrency=32

# Exchange
exchange.client-threads=25
exchange.http-client.max-connections=250
exchange.http-client.max-connections-per-server=250

# Memory management
memory.heap-headroom-per-node=2GB
query.low-memory-killer.policy=total-reservation-on-blocked-nodes
query.low-memory-killer.delay=5m

# Spill to disk when memory pressure is high
spill-enabled=true
spiller-spill-path=/data/trino/spill
spiller-max-used-space-threshold=0.7
spill-compression-enabled=true

# Fault tolerant execution for long-running ETL queries
retry-policy=TASK
task-retry-attempts-per-task=3
retry-initial-delay=10s
retry-max-delay=1m

# Security
http-server.authentication.type=PASSWORD
internal-communication.shared-secret=REPLACE_WITH_SECRET

# Resource groups
resource-groups.configuration-manager=file
resource-groups.config-file=/etc/trino/resource-groups.json

# JMX for monitoring
jmx.rmiregistry.port=9080
jmx.rmiserver.port=9081
