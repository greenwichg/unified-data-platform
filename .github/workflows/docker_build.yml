name: Docker Build & Push to ECR

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (flink, spark, airflow, kafka [local dev], trino [local dev], druid, debezium, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - flink
          - spark
          - airflow
          - kafka
          - trino
          - druid
          - debezium

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-1"
  ECR_REGISTRY: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com"
  IMAGE_PREFIX: "zomato-data-platform"

jobs:
  # --------------------------------------------------------------------------
  # Determine which images to build
  # --------------------------------------------------------------------------
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set build matrix
        id: set-matrix
        run: |
          # NOTE: kafka and trino images are deprecated for production use.
          # Production uses Amazon MSK (Kafka) and Amazon Athena (Trino replacement).
          # These images are retained for local development only.
          ALL_IMAGES='[
            {"name":"flink","context":"infra/docker/flink","dockerfile":"infra/docker/flink/Dockerfile"},
            {"name":"spark","context":"infra/docker/spark","dockerfile":"infra/docker/spark/Dockerfile"},
            {"name":"airflow","context":"infra/docker/airflow","dockerfile":"infra/docker/airflow/Dockerfile"},
            {"name":"msk","context":"infra/docker/msk","dockerfile":"infra/docker/msk/Dockerfile"},
            {"name":"athena","context":"infra/docker/athena","dockerfile":"infra/docker/athena/Dockerfile"},
            {"name":"druid","context":"infra/docker/druid","dockerfile":"infra/docker/druid/Dockerfile"},
            {"name":"debezium","context":"infra/docker","dockerfile":"infra/docker/debezium/Dockerfile"}
          ]'

          INPUT="${{ github.event.inputs.image }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            MATRIX="$ALL_IMAGES"
          else
            MATRIX=$(echo "$ALL_IMAGES" | jq -c --arg img "$INPUT" '[.[] | select(.name == $img)]')
          fi

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: ${MATRIX}"

  # --------------------------------------------------------------------------
  # Build and push images
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.image.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dockerfile not found: ${{ matrix.image.dockerfile }}"
          fi

      - name: Build and push
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Scan image with Trivy
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:${{ needs.prepare.outputs.version }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail on vulnerabilities, just report

      - name: Upload Trivy scan results
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image.name }}
          path: trivy-results-${{ matrix.image.name }}.sarif
          retention-days: 30

  # --------------------------------------------------------------------------
  # Post-build summary
  # --------------------------------------------------------------------------
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.ECR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
