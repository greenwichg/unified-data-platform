name: Terraform Plan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform_plan.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.6.6"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: "ap-south-1"

jobs:
  # --------------------------------------------------------------------------
  # Lint and validate
  # --------------------------------------------------------------------------
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/terraform/

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: |
          cd infra/terraform
          for dir in modules/*/; do
            echo "Linting ${dir}..."
            tflint --chdir="${dir}" --minimum-failure-severity=warning || true
          done

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov
        run: |
          checkov \
            --directory infra/terraform/ \
            --framework terraform \
            --quiet \
            --compact \
            --skip-check CKV_AWS_144,CKV_AWS_145,CKV2_AWS_6 \
            --soft-fail

  # --------------------------------------------------------------------------
  # Terraform Plan (always runs dev, staging, prod on any terraform change)
  # --------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init -input=false -no-color

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -detailed-exitcode \
            2>&1 | tee plan_output.txt
          TF_EXIT=${PIPESTATUS[0]}
          echo "exitcode=${TF_EXIT}" >> "$GITHUB_OUTPUT"
          # 0 = no changes, 2 = changes present — both success; 1 = error
          if [ $TF_EXIT -eq 1 ]; then exit 1; fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/terraform/environments/${{ matrix.environment }}/tfplan
          retention-days: 7

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              'infra/terraform/environments/${{ matrix.environment }}/plan_output.txt',
              'utf8'
            );

            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `### Terraform Plan: \`${{ matrix.environment }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
